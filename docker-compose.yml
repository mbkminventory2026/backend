services:
  # ── Development: Air hot-reload inside Docker ──────────────────────
  dev:
    container_name: permatatex-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
    volumes:
      - .:/app
      - gomodcache:/go/pkg/mod
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - permatatex-net

  # ── Production: optimized static binary ────────────────────────────
  app:
    container_name: permatatex-backend
    profiles: ["production"]
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "8080"
      GIN_MODE: "${GIN_MODE:-release}"
      CORS_ALLOW_ORIGIN: "${CORS_ALLOW_ORIGIN:-*}"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: "${DB_USER:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      DB_NAME: "${DB_NAME:-permatatex_inventory}"
      DB_SSLMODE: "${DB_SSLMODE:-disable}"
      JWT_SECRET: "${JWT_SECRET:-change-me}"
      TURNSTILE_SECRET: "${TURNSTILE_SECRET:-change-me}"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - permatatex-net

  db:
    container_name: permatatex-postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-postgres}"
      POSTGRES_DB: "${DB_NAME:-permatatex_inventory}"
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d permatatex_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - permatatex-net

volumes:
  pgdata:
  gomodcache:

networks:
  permatatex-net:
    driver: bridge
