basePath: /
definitions:
  model.AuthServiceUnavailableErrorDetail:
    properties:
      code:
        example: auth_service_unavailable
        type: string
    type: object
  model.CreateReportPengirimanRequest:
    properties:
      date:
        type: string
      id_wo_shell_size:
        type: integer
      quantity:
        type: integer
    required:
    - date
    - id_wo_shell_size
    - quantity
    type: object
  model.DeleteReportPengirimanResponse:
    properties:
      id_report_pengiriman:
        type: integer
    type: object
  model.GetMeResponse:
    properties:
      user_id:
        example: 1
        type: integer
    type: object
  model.GetMeSuccessDoc:
    properties:
      data:
        $ref: '#/definitions/model.GetMeResponse'
      message:
        example: profile retrieved
        type: string
      status:
        example: success
        type: string
    type: object
  model.GetMeUnauthorizedDoc:
    properties:
      error: {}
      message:
        example: unauthorized
        type: string
      status:
        example: error
        type: string
    type: object
  model.LoginBadGatewayDoc:
    properties:
      error:
        $ref: '#/definitions/model.TurnstileErrorDetail'
      message:
        example: captcha verification service unavailable
        type: string
      status:
        example: error
        type: string
    type: object
  model.LoginBadRequestDoc:
    properties:
      error: {}
      message:
        example: bad request
        type: string
      status:
        example: error
        type: string
    type: object
  model.LoginRateLimitErrorDetail:
    properties:
      code:
        example: too_many_login_attempts
        type: string
      retry_after_seconds:
        example: 60
        type: integer
    type: object
  model.LoginRequest:
    properties:
      password:
        type: string
      turnstile_token:
        type: string
      username:
        type: string
    required:
    - password
    - turnstile_token
    - username
    type: object
  model.LoginResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      token_type:
        type: string
    type: object
  model.LoginServiceUnavailableDoc:
    properties:
      error:
        $ref: '#/definitions/model.AuthServiceUnavailableErrorDetail'
      message:
        example: authentication service unavailable
        type: string
      status:
        example: error
        type: string
    type: object
  model.LoginSuccessDoc:
    properties:
      data:
        $ref: '#/definitions/model.LoginResponse'
      message:
        example: login successful
        type: string
      status:
        example: success
        type: string
    type: object
  model.LoginTooManyRequestsDoc:
    properties:
      error:
        $ref: '#/definitions/model.LoginRateLimitErrorDetail'
      message:
        example: too many login attempts, please try again later
        type: string
      status:
        example: error
        type: string
    type: object
  model.LoginUnauthorizedDoc:
    properties:
      message:
        example: invalid username or password
        type: string
      status:
        example: error
        type: string
    type: object
  model.ReportPengirimanBadRequestDoc:
    properties:
      error: {}
      message:
        example: bad request
        type: string
      status:
        example: error
        type: string
    type: object
  model.ReportPengirimanDeleteSuccessDoc:
    properties:
      data:
        $ref: '#/definitions/model.DeleteReportPengirimanResponse'
      message:
        example: report pengiriman deleted
        type: string
      status:
        example: success
        type: string
    type: object
  model.ReportPengirimanListSuccessDoc:
    properties:
      data:
        items:
          $ref: '#/definitions/model.ReportPengirimanResponse'
        type: array
      message:
        example: report pengiriman list retrieved
        type: string
      status:
        example: success
        type: string
    type: object
  model.ReportPengirimanNotFoundDoc:
    properties:
      error: {}
      message:
        example: report pengiriman not found
        type: string
      status:
        example: error
        type: string
    type: object
  model.ReportPengirimanResponse:
    properties:
      created_at:
        type: string
      date:
        type: string
      id_report_pengiriman:
        type: integer
      id_wo_shell_size:
        type: integer
      quantity:
        type: integer
    type: object
  model.ReportPengirimanServiceUnavailableDoc:
    properties:
      error: {}
      message:
        example: report pengiriman service unavailable
        type: string
      status:
        example: error
        type: string
    type: object
  model.ReportPengirimanSuccessDoc:
    properties:
      data:
        $ref: '#/definitions/model.ReportPengirimanResponse'
      message:
        example: report pengiriman created
        type: string
      status:
        example: success
        type: string
    type: object
  model.ReportPengirimanUnauthorizedDoc:
    properties:
      error: {}
      message:
        example: unauthorized
        type: string
      status:
        example: error
        type: string
    type: object
  model.TurnstileErrorDetail:
    properties:
      code:
        example: captcha_invalid
        type: string
      error_codes:
        items:
          type: string
        type: array
    type: object
  model.VerifyTurnstileBadGatewayDoc:
    properties:
      error:
        $ref: '#/definitions/model.TurnstileErrorDetail'
      message:
        example: captcha verification service unavailable
        type: string
      status:
        example: error
        type: string
    type: object
  model.VerifyTurnstileBadRequestDoc:
    properties:
      error:
        $ref: '#/definitions/model.TurnstileErrorDetail'
      message:
        example: captcha verification failed
        type: string
      status:
        example: error
        type: string
    type: object
  model.VerifyTurnstileRequest:
    properties:
      turnstile_token:
        maxLength: 2048
        type: string
    required:
    - turnstile_token
    type: object
  model.VerifyTurnstileResponse:
    properties:
      verified:
        example: true
        type: boolean
    type: object
  model.VerifyTurnstileSuccessDoc:
    properties:
      data:
        $ref: '#/definitions/model.VerifyTurnstileResponse'
      message:
        example: captcha verification succeeded
        type: string
      status:
        example: success
        type: string
    type: object
  response.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@permatatex.local
    name: API Support
  description: API documentation for Permatatex IT Inventory System backend.
  license:
    name: MIT
  termsOfService: https://swagger.io/terms/
  title: Permatatex IT Inventory API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates user using username, password, and Turnstile token,
        then returns JWT access token.
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.LoginSuccessDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.LoginBadRequestDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.LoginUnauthorizedDoc'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/model.LoginTooManyRequestsDoc'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/model.LoginBadGatewayDoc'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/model.LoginServiceUnavailableDoc'
      summary: Sign In
      tags:
      - Auth
  /api/v1/auth/me:
    get:
      description: Returns authenticated user ID extracted from JWT token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.GetMeSuccessDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.GetMeUnauthorizedDoc'
      security:
      - BearerAuth: []
      summary: Get Current User Profile
      tags:
      - Auth
  /api/v1/auth/turnstile/verify:
    post:
      consumes:
      - application/json
      description: Validates frontend Turnstile token via Cloudflare siteverify API.
      parameters:
      - description: Turnstile payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.VerifyTurnstileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.VerifyTurnstileSuccessDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.VerifyTurnstileBadRequestDoc'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/model.VerifyTurnstileBadGatewayDoc'
      summary: Verify Turnstile Token
      tags:
      - Auth
  /api/v1/report-pengiriman:
    get:
      description: Returns report pengiriman list with optional filters.
      parameters:
      - description: Start date filter (YYYY-MM-DD)
        in: query
        name: date_from
        type: string
      - description: End date filter (YYYY-MM-DD)
        in: query
        name: date_to
        type: string
      - description: Work order shell size ID filter
        in: query
        name: id_wo_shell_size
        type: integer
      - description: 'Result limit (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      - description: 'Result offset (default: 0)'
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ReportPengirimanListSuccessDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ReportPengirimanBadRequestDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ReportPengirimanUnauthorizedDoc'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/model.ReportPengirimanServiceUnavailableDoc'
      security:
      - BearerAuth: []
      summary: List Report Pengiriman
      tags:
      - Report Pengiriman
    post:
      consumes:
      - application/json
      description: Creates a new report pengiriman entry.
      parameters:
      - description: Create payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.CreateReportPengirimanRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.ReportPengirimanSuccessDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ReportPengirimanBadRequestDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ReportPengirimanUnauthorizedDoc'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/model.ReportPengirimanServiceUnavailableDoc'
      security:
      - BearerAuth: []
      summary: Create Report Pengiriman
      tags:
      - Report Pengiriman
  /api/v1/report-pengiriman/{id}:
    delete:
      description: Deletes report pengiriman by ID.
      parameters:
      - description: Report Pengiriman ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ReportPengirimanDeleteSuccessDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ReportPengirimanBadRequestDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ReportPengirimanUnauthorizedDoc'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ReportPengirimanNotFoundDoc'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/model.ReportPengirimanServiceUnavailableDoc'
      security:
      - BearerAuth: []
      summary: Delete Report Pengiriman
      tags:
      - Report Pengiriman
    get:
      description: Returns report pengiriman detail by ID.
      parameters:
      - description: Report Pengiriman ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ReportPengirimanSuccessDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ReportPengirimanBadRequestDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ReportPengirimanUnauthorizedDoc'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ReportPengirimanNotFoundDoc'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/model.ReportPengirimanServiceUnavailableDoc'
      security:
      - BearerAuth: []
      summary: Get Report Pengiriman Detail
      tags:
      - Report Pengiriman
  /health:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.HealthResponse'
      summary: Health Check
      tags:
      - System
schemes:
- http
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
