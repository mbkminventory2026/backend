host: localhost:8080
info:
  contact:
    email: support@permatatex.local
    name: API Support
  description: API documentation for Permatatex IT Inventory System backend.
  license:
    name: MIT
  termsOfService: https://swagger.io/terms/
  title: Permatatex IT Inventory API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates user using username, password, and Turnstile token,
        then returns JWT access token.
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.LoginSuccessDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.LoginBadRequestDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.LoginUnauthorizedDoc'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/model.LoginTooManyRequestsDoc'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/model.LoginBadGatewayDoc'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/model.LoginServiceUnavailableDoc'
      summary: Sign In
      tags:
      - Auth
  /api/v1/auth/me:
    get:
      description: Returns authenticated user ID extracted from JWT token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.GetMeSuccessDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.GetMeUnauthorizedDoc'
      security:
      - BearerAuth: []
      summary: Get Current User Profile
      tags:
      - Auth
  /api/v1/master/barang:
    get:
      parameters:
      - description: Limit (default 20)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ListBarangSuccessDoc'
      security:
      - BearerAuth: []
      summary: List Items
      tags:
      - Master Data
    post:
      consumes:
      - application/json
      parameters:
      - description: Item payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.CreateBarangRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.CreateBarangSuccessDoc'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/model.LoginBadRequestDoc'
      security:
      - BearerAuth: []
      summary: Create Item
      tags:
      - Master Data
  /api/v1/master/barang/{id}:
    delete:
      parameters:
      - description: Item ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.BaseResponse'
      security:
      - BearerAuth: []
      summary: Delete Item
      tags:
      - Master Data
    get:
      parameters:
      - description: Item ID
        in: path
        name: id
        required: true
        type: integer
