host: localhost:8080
info:
  contact:
    email: support@permatatex.local
    name: API Support
  description: API documentation for Permatatex IT Inventory System backend.
  license:
    name: MIT
  termsOfService: https://swagger.io/terms/
  title: Permatatex IT Inventory API
  version: "1.0"
paths:
  /api/v1/auth/change-password:
    post:
      consumes:
      - application/json
      description: Allows an authenticated user to change their password and refresh
        their session token.
      parameters:
      - description: Change password payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ChangePasswordSuccessDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.LoginBadRequestDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.GetMeUnauthorizedDoc'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/model.LoginServiceUnavailableDoc'
      security:
      - BearerAuth: []
      summary: Change Password
      tags:
      - Auth
  /api/v1/auth/forgot-password-requests:
    get:
      description: Returns all password reset requests for operator review.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PasswordResetRequestListSuccessDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.GetMeUnauthorizedDoc'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.LoginBadRequestDoc'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/model.LoginServiceUnavailableDoc'
      security:
      - BearerAuth: []
      summary: List Forgot Password Requests
      tags:
      - Auth
    post:
      consumes:
      - application/json
      description: Allows a user to request a manual password reset without email.
      parameters:
      - description: Forgot password request payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.ForgotPasswordRequestCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.BaseResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.LoginBadRequestDoc'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.LoginBadRequestDoc'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/model.LoginBadRequestDoc'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/model.LoginServiceUnavailableDoc'
      summary: Create Forgot Password Request
      tags:
      - Auth
  /api/v1/auth/forgot-password-requests/{id}/approve:
    patch:
      description: Approves a pending password reset request and issues a temporary
        password.
      parameters:
      - description: Password reset request ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ApprovePasswordResetSuccessDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.LoginBadRequestDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.GetMeUnauthorizedDoc'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.LoginBadRequestDoc'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/model.LoginServiceUnavailableDoc'
      security:
      - BearerAuth: []
      summary: Approve Forgot Password Request
      tags:
      - Auth
  /api/v1/auth/forgot-password-requests/{id}/reject:
    patch:
      consumes:
      - application/json
      description: Rejects a pending password reset request.
      parameters:
      - description: Password reset request ID
        in: path
        name: id
        required: true
        type: integer
      - description: Reject payload
        in: body
        name: payload
        schema:
          $ref: '#/definitions/model.RejectPasswordResetRequestRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.BaseResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.LoginBadRequestDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.GetMeUnauthorizedDoc'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.LoginBadRequestDoc'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/model.LoginServiceUnavailableDoc'
      security:
      - BearerAuth: []
      summary: Reject Forgot Password Request
      tags:
      - Auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates user using username, password, and Turnstile token,
        then returns JWT access token.
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.LoginSuccessDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.LoginBadRequestDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.LoginUnauthorizedDoc'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/model.LoginTooManyRequestsDoc'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/model.LoginBadGatewayDoc'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/model.LoginServiceUnavailableDoc'
      summary: Sign In
      tags:
      - Auth
  /api/v1/auth/me:
    get:
      description: Returns authenticated user ID extracted from JWT token.
      produces:
